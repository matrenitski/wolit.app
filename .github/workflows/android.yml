name: Android build

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        # The public Google client ID and network can be injected from repo
        # variables; the build also compiles fine without them.
        run: >-
          ./gradlew --no-daemon assembleDebug
          -PwolitGoogleClientId="${{ vars.ANDROID_GOOGLE_CLIENT_ID }}"
          -PwolitNetwork="${{ vars.ANDROID_BITCOIN_NETWORK || 'testnet' }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wolit-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
